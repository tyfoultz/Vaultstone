<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vaultstone — TTRPG World-builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screens_a.jsx"></script>
<script type="text/babel" src="screens_b.jsx"></script>
<script type="text/babel" src="screens_c.jsx"></script>
<script type="text/babel" src="screens_d.jsx"></script>
<script type="text/babel" src="screens_e.jsx"></script>
<script type="text/babel" src="screens_f.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#8b5cf6",
  "sidebar": "compact",
  "density": "cozy",
  "heading": "icon",
  "mapStyle": "dark"
}/*EDITMODE-END*/;

function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('vs_screen') || 'locations');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => { localStorage.setItem('vs_screen', screen); }, [screen]);
  useEffect(() => { document.documentElement.style.setProperty('--accent', tweaks.accent); }, [tweaks.accent]);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweaks = (next) => {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const label = {
    dashboard: 'Home', locations: 'Locations', map: 'World Map',
    wiki: 'Lore Wiki', timeline: 'Timeline', npcs: 'Lord Malakor', factions: 'Faction Graph',
    players: 'Players',
  }[screen];

  const renderScreen = () => {
    switch (screen) {
      case 'dashboard': return <><TopBar crumbs={['Campaign Home']} /><Dashboard setScreen={setScreen} tweaks={tweaks} /></>;
      case 'locations': return <><TopBar crumbs={['Locations']} /><Locations setScreen={setScreen} tweaks={tweaks} /></>;
      case 'players': return <><TopBar crumbs={['Players']} /><Players setScreen={setScreen} tweaks={tweaks} /></>;
      case 'map': return <WorldMap tweaks={tweaks} />;
      case 'wiki': return <Wiki setScreen={setScreen} tweaks={tweaks} />;
      case 'timeline': return <Timeline setScreen={setScreen} tweaks={tweaks} />;
      case 'npcs': return <NPC setScreen={setScreen} tweaks={tweaks} />;
      case 'factions': return <Factions setScreen={setScreen} tweaks={tweaks} />;
      default: return null;
    }
  };

  const inlineTop = (screen === 'map' || screen === 'wiki' || screen === 'timeline' || screen === 'npcs' || screen === 'factions');

  return (
    <div className={'app ' + (tweaks.sidebar === 'compact' ? 'compact' : tweaks.sidebar === 'comfortable' ? 'comfortable' : '')} data-screen-label={label}>
      <Rail screen={screen} setScreen={setScreen} tweaks={tweaks} />
      <Sidebar screen={screen} setScreen={setScreen} tweaks={tweaks} />
      {inlineTop ? renderScreen() : (
        <div className="main">{renderScreen()}</div>
      )}
      {editMode && <TweaksPanel tweaks={tweaks} setTweaks={updateTweaks} onClose={() => setEditMode(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
